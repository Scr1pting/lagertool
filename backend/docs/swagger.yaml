basePath: /
definitions:
  api_objects.BorrowHistory:
    properties:
      amount:
        type: integer
      approvalState:
        type: string
      approvalStateTime:
        type: string
      authorName:
        type: string
      dueAt:
        type: string
      returnedAt:
        type: string
      startDate:
        type: string
      title:
        type: string
    type: object
  api_objects.Building:
    properties:
      campus:
        description: GPS        string   `json:"gps"`
        type: string
      id:
        type: integer
      name:
        type: string
      updateDate:
        type: string
    type: object
  api_objects.BuildingRequest:
    properties:
      campus:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  api_objects.CartItem:
    properties:
      amount:
        type: integer
      amountSelected:
        type: integer
      available:
        type: integer
      building:
        $ref: '#/definitions/db_models.Building'
      id:
        type: integer
      name:
        type: string
      room:
        $ref: '#/definitions/db_models.Room'
      shelfId:
        type: string
    type: object
  api_objects.CartRequest:
    properties:
      id:
        type: integer
      numSelected:
        type: integer
    required:
    - id
    - numSelected
    type: object
  api_objects.CheckoutRequest:
    properties:
      endDate:
        type: string
      startDate:
        type: string
    required:
    - endDate
    - startDate
    type: object
  api_objects.ColumnElementRequest:
    properties:
      elements:
        items:
          $ref: '#/definitions/api_objects.ShelfElementRequest'
        type: array
      id:
        type: string
    required:
    - elements
    - id
    type: object
  api_objects.Columns:
    properties:
      elements:
        items:
          $ref: '#/definitions/api_objects.Element'
        type: array
      id:
        type: string
    type: object
  api_objects.Element:
    properties:
      id:
        type: string
      type:
        type: string
    type: object
  api_objects.InventoryItemRequest:
    properties:
      amount:
        type: integer
      isConsumable:
        type: boolean
      name:
        type: string
      note:
        type: string
      organisation:
        type: string
      shelfId:
        type: string
      shelfUnitId:
        type: string
    required:
    - amount
    - isConsumable
    - name
    - note
    - shelfId
    - shelfUnitId
    type: object
  api_objects.InventoryItemWithShelf:
    properties:
      amount:
        type: integer
      available:
        type: integer
      building:
        $ref: '#/definitions/db_models.Building'
      id:
        type: integer
      name:
        type: string
      room:
        $ref: '#/definitions/db_models.Room'
      shelf:
        $ref: '#/definitions/api_objects.Shelves'
      shelfId:
        type: string
    type: object
  api_objects.InventorySorted:
    properties:
      amount:
        type: integer
      available:
        type: integer
      building:
        $ref: '#/definitions/db_models.Building'
      id:
        type: integer
      name:
        type: string
      room:
        $ref: '#/definitions/db_models.Room'
    type: object
  api_objects.Message:
    properties:
      authorName:
        type: string
      id:
        type: integer
      isAdmin:
        type: boolean
      message:
        type: string
      state:
        type: string
      timeStamp:
        type: string
    type: object
  api_objects.RequestReview:
    properties:
      note:
        type: string
      outcome:
        type: string
      user_id:
        type: integer
    type: object
  api_objects.Room:
    properties:
      building:
        $ref: '#/definitions/db_models.Building'
      floor:
        type: string
      id:
        type: integer
      name:
        type: string
      number:
        type: string
      updateDate:
        type: string
    type: object
  api_objects.RoomRequest:
    properties:
      floor:
        type: string
      name:
        type: string
      number:
        type: string
    required:
    - floor
    - number
    type: object
  api_objects.ShelfElementRequest:
    properties:
      id:
        type: string
      type:
        type: string
    required:
    - id
    - type
    type: object
  api_objects.ShelfRequest:
    properties:
      columns:
        items:
          $ref: '#/definitions/api_objects.ColumnElementRequest'
        type: array
      id:
        type: string
      name:
        type: string
    required:
    - columns
    - id
    - name
    type: object
  api_objects.Shelves:
    properties:
      building:
        $ref: '#/definitions/db_models.Building'
      columns:
        items:
          $ref: '#/definitions/api_objects.Columns'
        type: array
      id:
        type: string
      name:
        type: string
      room:
        $ref: '#/definitions/db_models.Room'
    type: object
  api_objects.UpdateCartItem:
    properties:
      amount:
        type: integer
    type: object
  api_objects.UpdateItemRequest:
    properties:
      amount:
        type: integer
      note:
        type: string
      shelfUnitId:
        type: string
    type: object
  api_objects.UpdateLoan:
    properties:
      returnedAt:
        type: string
    type: object
  api_objects.UpdateRequest:
    properties:
      outcome:
        type: string
    type: object
  api_objects.UserMessage:
    properties:
      message:
        type: string
      userId:
        type: integer
    type: object
  db_models.Building:
    properties:
      campus:
        type: string
      gps:
        type: string
      id:
        type: integer
      name:
        type: string
      update_date:
        type: string
    type: object
  db_models.Column:
    properties:
      id:
        type: string
      shelf:
        $ref: '#/definitions/db_models.Shelf'
      shelf_id:
        type: string
      shelf_units:
        items:
          $ref: '#/definitions/db_models.ShelfUnit'
        type: array
    type: object
  db_models.Inventory:
    properties:
      amount:
        type: integer
      id:
        type: integer
      is_consumable:
        type: boolean
      item_id:
        type: integer
      name:
        type: string
      note:
        type: string
      request_item:
        items:
          $ref: '#/definitions/db_models.RequestItems'
        type: array
      shelf:
        $ref: '#/definitions/db_models.Shelf'
      shelf_id:
        type: string
      shelf_unit:
        $ref: '#/definitions/db_models.ShelfUnit'
      shelf_unit_id:
        type: string
      update_date:
        type: string
    type: object
  db_models.Organisation:
    properties:
      name:
        type: string
    type: object
  db_models.Request:
    properties:
      created_at:
        type: string
      end_date:
        type: string
      group_id:
        type: integer
      id:
        type: integer
      note:
        type: string
      organisation:
        $ref: '#/definitions/db_models.Organisation'
      organisationName:
        type: string
      request_item:
        items:
          $ref: '#/definitions/db_models.RequestItems'
        type: array
      start_date:
        type: string
      state:
        type: string
      time_state:
        type: string
      user:
        $ref: '#/definitions/db_models.User'
      user_id:
        type: integer
    type: object
  db_models.RequestItems:
    properties:
      amount:
        type: integer
      id:
        type: integer
      inventory:
        $ref: '#/definitions/db_models.Inventory'
      inventory_id:
        type: integer
      request:
        $ref: '#/definitions/db_models.Request'
      request_id:
        type: integer
    type: object
  db_models.RequestReview:
    properties:
      id:
        type: integer
      note:
        type: string
      outcome:
        type: string
      request:
        $ref: '#/definitions/db_models.Request'
      request_id:
        type: integer
      time_stamp:
        type: string
      user:
        $ref: '#/definitions/db_models.User'
      user_id:
        type: integer
    type: object
  db_models.Room:
    properties:
      building:
        $ref: '#/definitions/db_models.Building'
      building_id:
        type: integer
      floor:
        type: string
      id:
        type: integer
      name:
        type: string
      number:
        type: string
      update_date:
        type: string
    type: object
  db_models.Shelf:
    properties:
      columns:
        items:
          $ref: '#/definitions/db_models.Column'
        type: array
      id:
        type: string
      name:
        type: string
      organisation:
        $ref: '#/definitions/db_models.Organisation'
      owned_by:
        type: string
      room:
        $ref: '#/definitions/db_models.Room'
      room_id:
        type: integer
      update_date:
        type: string
    type: object
  db_models.ShelfUnit:
    properties:
      column:
        $ref: '#/definitions/db_models.Column'
      column_id:
        type: string
      description:
        type: string
      id:
        type: string
      position_in_column:
        description: to change the order of the units in the column later
        type: integer
      type:
        description: 0 is small, 1 is big
        type: integer
    type: object
  db_models.ShoppingCart:
    properties:
      id:
        type: integer
      shopping_cart_items:
        items:
          $ref: '#/definitions/db_models.ShoppingCartItem'
        type: array
      user_id:
        type: integer
    type: object
  db_models.ShoppingCartItem:
    properties:
      amount:
        type: integer
      id:
        type: integer
      inventory:
        $ref: '#/definitions/db_models.Inventory'
      inventory_id:
        type: integer
      shopping_cart:
        $ref: '#/definitions/db_models.ShoppingCart'
      shopping_cart_id:
        type: integer
    type: object
  db_models.User:
    properties:
      access_token:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      issuer:
        type: string
      last_login:
        type: string
      name:
        type: string
      refresh_token:
        type: string
      subject:
        type: string
    type: object
host: localhost:8000
info:
  contact:
    email: support@lagertool.com
    name: API Support
  description: Backend API for inventory management system tracking items, locations,
    and loans
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Lagertool Inventory API
  version: "1.0"
paths:
  /loans/{id}:
    put:
      consumes:
      - application/json
      description: Mark a loan as returned
      parameters:
      - description: Loan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update details
        in: body
        name: loan
        required: true
        schema:
          $ref: '#/definitions/api_objects.UpdateLoan'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
      summary: Update a loan
      tags:
      - loans
  /organisations:
    get:
      description: Get all organisations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/db_models.Organisation'
            type: array
      summary: Get all organisations
      tags:
      - organisations
  /organisations/{orgId}/buildings:
    get:
      description: Get all buildings sorted by update date
      parameters:
      - description: Organisation name
        in: path
        name: orgId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_objects.Building'
            type: array
      summary: Get all buildings for an organisation
      tags:
      - buildings
    post:
      consumes:
      - application/json
      description: Create a new building for an organisation
      parameters:
      - description: Organisation name
        in: path
        name: orgId
        required: true
        type: string
      - description: Building object
        in: body
        name: building
        required: true
        schema:
          $ref: '#/definitions/api_objects.BuildingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/db_models.Building'
      summary: Create a new building
      tags:
      - buildings
  /organisations/{orgId}/buildings/{buildingId}/rooms:
    post:
      consumes:
      - application/json
      description: Create a new room in a building
      parameters:
      - description: Organisation name
        in: path
        name: orgId
        required: true
        type: string
      - description: Building ID
        in: path
        name: buildingId
        required: true
        type: integer
      - description: Room object
        in: body
        name: room
        required: true
        schema:
          $ref: '#/definitions/api_objects.RoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/db_models.Room'
      summary: Create a new room
      tags:
      - rooms
  /organisations/{orgId}/buildings/{buildingId}/rooms/{roomId}/shelves:
    post:
      consumes:
      - application/json
      description: Create a new shelf in a room
      parameters:
      - description: Organisation name
        in: path
        name: orgId
        required: true
        type: string
      - description: Building ID
        in: path
        name: buildingId
        required: true
        type: integer
      - description: Room ID
        in: path
        name: roomId
        required: true
        type: integer
      - description: Shelf object
        in: body
        name: shelf
        required: true
        schema:
          $ref: '#/definitions/api_objects.ShelfRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/db_models.Shelf'
      summary: Create a new shelf
      tags:
      - shelves
  /organisations/{orgId}/inventory:
    get:
      description: Get all inventory items sorted by update date
      parameters:
      - description: Organisation name
        in: path
        name: orgId
        required: true
        type: string
      - description: Start date in format 2006-01-02
        in: query
        name: start
        required: true
        type: string
      - description: End date in format 2006-01-02
        in: query
        name: end
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_objects.InventorySorted'
            type: array
      summary: Get all inventory items for an organisation
      tags:
      - inventory
  /organisations/{orgId}/items:
    post:
      consumes:
      - application/json
      description: Create a new inventory item
      parameters:
      - description: Inventory item object
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/api_objects.InventoryItemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/db_models.Inventory'
      summary: Create a new inventory item
      tags:
      - items
  /organisations/{orgId}/items/{id}:
    get:
      description: Get a specific item
      parameters:
      - description: Inventory Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Start date in format 2006-01-02
        in: query
        name: start
        type: string
      - description: End date in format 2006-01-02
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_objects.InventoryItemWithShelf'
      summary: Get a specific item
      tags:
      - items
    put:
      consumes:
      - application/json
      description: Update an inventory item's details
      parameters:
      - description: Inventory Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update details
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/api_objects.UpdateItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db_models.Inventory'
      summary: Update an inventory item
      tags:
      - items
  /organisations/{orgId}/items/{id}/borrows:
    get:
      description: Get all borrow/loan history for an inventory item
      parameters:
      - description: Inventory Item ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_objects.BorrowHistory'
            type: array
      summary: Get borrow history for an item
      tags:
      - items
  /organisations/{orgId}/rooms:
    get:
      description: Get all rooms sorted by update date
      parameters:
      - description: Organisation name
        in: path
        name: orgId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_objects.Room'
            type: array
      summary: Get all rooms for an organisation
      tags:
      - rooms
  /organisations/{orgId}/shelves:
    get:
      description: Get all shelves for an organisation
      parameters:
      - description: Organisation name
        in: path
        name: orgId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_objects.Shelves'
            type: array
      summary: Get all shelves for an organisation
      tags:
      - shelves
  /requests/{id}:
    put:
      consumes:
      - application/json
      description: Update the status of a request
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api_objects.UpdateRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
      summary: Update a request
      tags:
      - requests
  /requests/{id}/loans:
    put:
      consumes:
      - application/json
      description: Mark all loans for a given request as returned
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update details
        in: body
        name: loan
        required: true
        schema:
          $ref: '#/definitions/api_objects.UpdateLoan'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
      summary: Bulk update loans for a request
      tags:
      - loans
  /requests/{id}/messages:
    get:
      description: Get all messages (user and admin) for a request, sorted by timestamp
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_objects.Message'
            type: array
      summary: Get messages for a request
      tags:
      - requests
    post:
      consumes:
      - application/json
      description: Post a user message on a borrow request
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: integer
      - description: Message object
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/api_objects.UserMessage'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_objects.UserMessage'
      summary: Post a message to a request
      tags:
      - requests
  /requests/{id}/review:
    post:
      consumes:
      - application/json
      description: Review/approve/deny a borrow request
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: integer
      - description: Review details
        in: body
        name: review
        required: true
        schema:
          $ref: '#/definitions/api_objects.RequestReview'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db_models.RequestReview'
      summary: Review a request
      tags:
      - requests
  /search/{searchTerm}:
    get:
      description: Search for inventory items by name using fuzzy matching
      parameters:
      - description: Search term
        in: path
        name: searchTerm
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/db_models.Inventory'
            type: array
      summary: Fuzzy search for inventory items
      tags:
      - search
  /users/{userId}/cart:
    get:
      description: Get a user's shopping cart
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: Start date in format 2006-01-02
        in: query
        name: start
        required: true
        type: string
      - description: End date in format 2006-01-02
        in: query
        name: end
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/api_objects.CartItem'
              type: array
            type: object
      summary: Get a user's shopping cart
      tags:
      - cart
  /users/{userId}/cart/checkout:
    post:
      consumes:
      - application/json
      description: Checkout the user's shopping cart and create requests
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: Checkout details
        in: body
        name: checkout
        required: true
        schema:
          $ref: '#/definitions/api_objects.CheckoutRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
      summary: Checkout shopping cart
      tags:
      - cart
  /users/{userId}/cart/items:
    delete:
      description: Delete all items from a user's shopping cart
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/db_models.ShoppingCartItem'
            type: array
      summary: Delete all cart items
      tags:
      - cart
    post:
      consumes:
      - application/json
      description: Add an item to the shopping cart
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: Cart item object
        in: body
        name: cart_item
        required: true
        schema:
          $ref: '#/definitions/api_objects.CartRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/db_models.ShoppingCartItem'
      summary: Add an item to the shopping cart
      tags:
      - cart
  /users/{userId}/cart/items/{itemId}:
    delete:
      description: Delete a specific item from a user's shopping cart by inventory
        item ID
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: Inventory Item ID
        in: path
        name: itemId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Delete a single cart item
      tags:
      - cart
    put:
      consumes:
      - application/json
      description: Update the amount of an item in a user's shopping cart
